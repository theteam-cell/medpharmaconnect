<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>iPhone Preview — PracticePath</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1c1c1e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 20px 80px;
      font-family: -apple-system, sans-serif;
    }
    h1 {
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0.5;
    }
    .phone {
      position: relative;
      width: 430px;
      background: #000;
      border-radius: 54px;
      padding: 14px;
      box-shadow:
        0 0 0 2px #3a3a3c,
        0 0 0 6px #1c1c1e,
        0 40px 100px rgba(0,0,0,0.8);
    }
    /* side buttons */
    .phone::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 120px;
      width: 4px;
      height: 34px;
      background: #3a3a3c;
      border-radius: 2px 0 0 2px;
      box-shadow: 0 50px 0 #3a3a3c, 0 100px 0 #3a3a3c;
    }
    .phone::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 160px;
      width: 4px;
      height: 68px;
      background: #3a3a3c;
      border-radius: 0 2px 2px 0;
    }
    .screen {
      background: #000;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
      height: 854px;
    }
    /* Dynamic Island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
    }
    iframe {
      width: 390px;
      height: 854px;
      border: none;
      display: block;
      margin: 0 auto;
    }
    .label {
      color: #888;
      font-size: 12px;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>iPhone 15 Preview · 390 × 844</h1>
  <div class="phone">
    <div class="screen">
      <div class="dynamic-island"></div>
      <iframe src="index.html" title="Site preview"></iframe>
    </div>
  </div>
  <p class="label">Scroll inside the frame to see the full page</p>
</body>
</html>
