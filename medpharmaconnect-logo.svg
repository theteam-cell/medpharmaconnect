<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <style>
      .brand-navy { fill: #003d5c; }
      .brand-blue { fill: #0077b6; }
      .brand-teal { fill: #0096a0; }
      .wordmark-med { font-family: Georgia, 'Times New Roman', serif; font-size: 42px; font-weight: 700; fill: #003d5c; }
      .wordmark-pharma { font-family: Georgia, 'Times New Roman', serif; font-size: 42px; font-weight: 700; fill: #0077b6; }
      .wordmark-connect { font-family: Georgia, 'Times New Roman', serif; font-size: 42px; font-weight: 700; fill: #0096a0; }
    </style>
  </defs>

  <!-- ═══ ICON: House with stethoscope roofline ═══ -->

  <!-- House body -->
  <rect x="20" y="88" width="100" height="62" rx="4" fill="#003d5c"/>

  <!-- Door -->
  <rect x="56" y="112" width="28" height="38" rx="3" fill="#0096a0"/>

  <!-- Left window -->
  <rect x="28" y="98" width="20" height="18" rx="2" fill="#0077b6" opacity="0.7"/>

  <!-- Right window -->
  <rect x="92" y="98" width="20" height="18" rx="2" fill="#0077b6" opacity="0.7"/>

  <!-- Stethoscope as roofline -->
  <!-- Left tube going up from house left corner -->
  <path d="M20,90 Q8,65 28,44" fill="none" stroke="#0096a0" stroke-width="7" stroke-linecap="round"/>

  <!-- Top arc over roof peak -->
  <path d="M28,44 Q70,10 112,44" fill="none" stroke="#0096a0" stroke-width="7" stroke-linecap="round"/>

  <!-- Right tube going down to house right corner -->
  <path d="M112,44 Q132,65 120,90" fill="none" stroke="#0096a0" stroke-width="7" stroke-linecap="round"/>

  <!-- Left earpiece -->
  <circle cx="14" cy="93" r="8" fill="none" stroke="#0096a0" stroke-width="5"/>
  <circle cx="14" cy="93" r="3.5" fill="#003d5c"/>

  <!-- Right earpiece -->
  <circle cx="126" cy="93" r="8" fill="none" stroke="#0096a0" stroke-width="5"/>
  <circle cx="126" cy="93" r="3.5" fill="#003d5c"/>

  <!-- Chest piece (diaphragm) at apex of roof -->
  <circle cx="70" cy="22" r="18" fill="#003d5c" stroke="#0096a0" stroke-width="3.5"/>
  <circle cx="70" cy="22" r="12" fill="#0077b6"/>
  <circle cx="70" cy="22" r="6" fill="#0096a0"/>

  <!-- ═══ WORDMARK ═══ -->
  <text x="158" y="105" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700">
    <tspan fill="#003d5c">Med</tspan><tspan fill="#0077b6">Pharma</tspan>
  </text>
  <text x="158" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#0096a0">Connect</text>

  <!-- Teal accent line under wordmark -->
  <rect x="158" y="156" width="352" height="3" rx="1.5" fill="#0096a0"/>

</svg>
