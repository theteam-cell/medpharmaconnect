<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | MedPharmaConnect</title>
  <meta name="description" content="Thanks for reaching out to MedPharmaConnect. We'll be in touch shortly." />
  <meta name="robots" content="noindex, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #003d5c;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 560px; }
    .check {
      width: 72px; height: 72px;
      margin: 0 auto 28px;
      border-radius: 50%;
      background: #0096a0;
      display: flex; align-items: center; justify-content: center;
    }
    .check svg { width: 38px; height: 38px; stroke: #fff; stroke-width: 3; fill: none; }
    h1 {
      font-family: 'Merriweather', serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      margin-bottom: 16px;
    }
    p {
      color: rgba(255,255,255,0.82);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #0096a0;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      padding: 0.85rem 1.8rem;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .btn:hover { background: #00b4d8; }
    .brand {
      font-family: 'Merriweather', serif;
      font-weight: 700;
      margin-bottom: 40px;
      font-size: 1.25rem;
    }
    .brand span { color: #00b4d8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">MedPharma<span>Connect</span></div>
    <div class="check">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h1>Thank you — we got it.</h1>
    <p>Thanks for reaching out. We'll review your details and follow up soon with information on physician mortgage options that fit your situation. No spam, no pressure.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
