<script>
const POSTS = [{"date": "2026-05-13", "topic": ".", "linkedin": "Building a home as a physician is a different conversation than buying one — and a lot of doctors learn that the hard way.\n\nA physician construction loan combines the no-PMI, low-down, contract-friendly underwriting of a physician mortgage with the staged, draw-based funding of a construction loan. But there are two flavors, and the choice matters in 2026.\n\n**One-time close (OTC):** You close once, before the foundation is poured. Permanent-loan rate is locked from day one for 12+ months. Slightly higher rate, but one set of closing costs and zero rate risk during the build.\n\n**Two-time close:** Separate construction loan, then a permanent refi at completion. Two closings. Rate isn't locked until the home is finished — you reprice into whatever the market does.\n\nWith the 30-year fixed at 6.37% this week (up from 6.30%), and forecasts clustered at 5.9%–6.5% by late summer, OTC has a slight edge for most builders right now. The exception: a long build (14+ months) where you genuinely expect rates to fall.\n\nFour physician-specific wrinkles to plan around:\n\n1. The construction-loan lender list is shorter than the purchase-loan list. Plan on 2–3 quotes, not 5.\n2. Pharmacists are included by fewer construction programs than purchase programs — confirm before you fall in love with a plot.\n3. The new federal Repayment Assistance Plan (RAP) goes live July 1, 2026. Because your construction loan won't close for 12+ months, lenders are increasingly pre-underwriting projected RAP payments — which can swing qualifying purchase price by $50K–$150K on a high-debt, high-AGI file.\n4. The builder's preferred lender often steers you off the physician program and back to conventional with PMI. Quote both paths side by side.\n\nPick the structure first, then the lender.\n\n#PhysicianMortgage #PhysiciansOfLinkedIn #Homebuilding #DoctorFinance #DentistLife #PharmacistLife", "facebook": "Building a home as a doctor, dentist, or pharmacist? Your physician mortgage may have a sibling you've never met: the physician construction loan.\n\nSame vibe — no PMI, low-to-zero down, contract income counts — but the structure is different. You can either close once (locking your rate before the foundation is poured) or twice (locking your rate when the home is done). One isn't universally better. With rates at 6.37% this week and forecasts hovering 5.9%–6.5% into late summer, the \"close once\" route is winning more often right now.\n\nThree quick things to know:\n🏗️ Fewer banks offer this product than offer the purchase version — plan on 2–3 quotes.\n📚 The new student loan rules (RAP) start July 1, 2026, and your build will close after that — get the lender's DTI math under RAP, not your current payment.\n🤝 The builder's preferred lender isn't always your best lender — quote both side by side.\n\nPick the structure first. Pick the lender second. Then break ground.", "twitter": "Building a home as a doctor?\n\nPhysician construction loan ≠ physician mortgage.\n\nOTC: lock rate day one, close once.\nTwo-close: lock at completion, close twice.\n\n30-yr at 6.37% & rising. OTC edge for most builders right now.\n\nPick the structure before you pick the lender.", "instagram": "The physician mortgage gets all the airtime — but its construction-loan sibling is the product that matters if you're building.\n\nSame DNA (no PMI, low down, contract income counts), different structure: one closing or two, rate locked now or rate locked at completion. With the 30-year fixed at 6.37% this week and forecasts clustered 5.9%–6.5% by late summer, the \"lock it now\" option is winning more often. Full breakdown on the site.\n\n#PhysicianMortgage #PhysiciansOfInstagram #BuildingAHome #DoctorLife #DentistLife #PharmacistLife #PracticePath", "tiktok": "**Hook (first 3 sec):** \"Building a house as a doctor? Don't sign the builder's mortgage paperwork yet.\"\n\n**Talking points (45–60 sec total):**\n- Physician construction loan = no PMI, low down, contract counts — but draws during the build.\n- Two flavors: one-time close (rate locked day one) or two-time close (rate locked at completion).\n- 30-yr fixed at 6.37% this week, second straight uptick. Most builders should lean OTC right now.\n- Three traps: short lender list, RAP starts July 1, the builder's \"preferred\" lender is rarely your best lender.\n- Close: \"Pick the structure first. Then pick the lender. Comment LOAN if you want the playbook.\"\n\n**On-screen text overlays:**\n- \"OTC vs. Two-Close\"\n- \"Lock now vs. lock later\"\n- \"RAP = July 1\"\n- \"Compare 4 numbers on the LE\""}, {"date": "2026-05-14", "topic": ")", "linkedin": "**Headline angle: the starter-home playbook quietly broke, and most new attendings haven't done the math.**\n\nThe classic advice given to new attendings — \"buy a modest starter, trade up in five years\" — was built on three assumptions that don't hold in 2026:\n\n1. Rates would be lower at upsize than at purchase.\n2. Home prices would compound at 4%–5% a year.\n3. Selling and rebuying was cheap.\n\nToday, the Freddie Mac 30-year fixed sits at 6.37% with physician-loan pricing layered 0.125%–0.50% on top. JPMorgan Global Research expects U.S. home prices to stall near 0% in 2026. And selling a $500K starter to buy an $850K forever home runs $55K–$70K in friction costs alone.\n\nThere's also a quieter variable physicians are missing: the federal Repayment Assistance Plan (RAP) launches July 1, 2026. For PSLF-track borrowers, the new AGI-based payment formula will likely push DTI *higher* on the next mortgage application than it is today. Translation: the forever home you can qualify for now may be larger than the one you can qualify for in 2029.\n\nRocket Mortgage's 2026 buyer data tells the same story from the other direction — only 16% of 2025 buyers said they were treating their first home as a tradable starter, down from 29% in 2022.\n\nDecision framework I use with attendings on this question:\n\n→ Will you be in this metro 7+ years? If not, neither answer is right — rent.\n→ Is your \"forever\" budget already contractually visible, or aspirational?\n→ How much smaller is the starter, really?\n→ Will RAP make your next DTI worse, not better?\n\nFor most day-1 attendings with a signed contract and a stable metro, the answer in 2026 is closer to forever than to starter. The friction cost of a fast trade-up is just too high to clear without 4%–5% appreciation doing the work for you.\n\nFull breakdown with stage-by-stage verdicts for residents, fellows, attendings, two-physician households, and dentist/pharmacist owners on MedPharmaConnect.\n\n#PhysicianFinance #PhysicianMortgage #RealEstate #StudentLoans #PSLF", "facebook": "**Quick reality check for doctors, dentists, and pharmacists thinking about buying this summer:**\n\nThe old \"buy a starter home and trade up in five years\" plan needs a 2026 update.\n\nMortgage rates are sticky in the mid-6s. Home prices may be flat this year (JPMorgan: ~0% projected). And selling a $500K home to buy an $850K home easily costs $55K–$70K in commissions, closing costs, and a reset amortization clock.\n\nAdd the July 1 federal student-loan changes (new RAP plan, AGI-based payments) and the \"trade up later\" path gets tougher, not easier, for physicians carrying PSLF debt.\n\nIf you're a new attending with a signed contract and you plan to stay in your metro for 7+ years — it may make more sense to buy closer to your forever home now, not later. If you don't have that 7-year horizon? Renting is still the underdog answer that keeps proving right.\n\nWe just published a full decision framework (4 questions, stage-by-stage verdicts) on the site. Link in comments.", "twitter": "The \"buy a starter, trade up in 5 years\" advice given to new doctors? Quietly broken in 2026.\n\n→ Rates sticky at 6.3%+\n→ Prices projected ~0% this year\n→ Sell-and-rebuy friction: $55K–$70K\n→ July 1 RAP shrinks future DTI\n\nIf you'll be in your metro 7+ years, forever > starter. (273 chars)", "instagram": "The classic \"buy a starter, trade up in 5 years\" advice was built for a different decade. ⏳\n\nIn 2026:\n• 30-yr fixed: 6.37% (and physician loans add 0.125–0.50%)\n• U.S. home prices projected to stall near 0%\n• Sell-and-rebuy friction on a $500K → $850K move: $55K–$70K\n• July 1 RAP launches — tightens DTI on the *next* mortgage for PSLF-track docs\n\nThe new question isn't \"starter or forever?\" It's:\n1️⃣ Will I be in this metro 7+ years?\n2️⃣ Is my forever budget already contractually visible?\n3️⃣ How much smaller is the starter, really?\n4️⃣ Will RAP make my next DTI worse?\n\nFor most day-1 attendings with a signed contract and a stable metro, the 2026 answer tilts forever, not starter.\n\nFull framework + stage-by-stage verdicts for residents, fellows, attendings, two-doc households, and owner-track dentists/pharmacists — on MedPharmaConnect.\n\n#PhysicianFinance #DoctorMortgage #RealEstate2026 #PSLF #DentistFinance #PharmacistFinance #FirstTimeHomeBuyer", "tiktok": "**Hook (first 3 seconds):** \"The 'starter home, trade up in 5 years' advice your residency director gave you? Already obsolete.\"\n\n**Talking points (45–60s total):**\n\n- Three assumptions that quietly broke: lower rates at upsize (didn't happen), 4–5% appreciation (JPMorgan says 0% in 2026), cheap to sell-and-rebuy ($55K–$70K on a $500K → $850K move).\n- The new wrinkle nobody's talking about: July 1 RAP launch. For PSLF docs, your *next* mortgage DTI is likely worse, not better.\n- Four-question filter: 7+ years in this metro? Contracted forever income? Real lifestyle gap? RAP making future DTI worse?\n- If three of four are yes, go forever. If \"7+ years\" is no, rent.\n\n**On-screen text:** \"Strategy first. Property second. Loan third.\"\n\n**Caption:** \"The starter home playbook was built for a market that doesn't exist anymore. Here's the 2026 version. #physicianmortgage #foreverhome #doctorfinance #pslf\""}, {"date": "2026-05-15", "topic": "2026-05-15", "linkedin": "July 1, 2026 is a quiet but consequential date for any physician carrying federal student loans.\n\nThat's when servicers begin issuing 90-day notices to ~7.5 million SAVE plan borrowers. After that window, you'll either pick a new repayment plan — Repayment Assistance Plan (RAP), Tiered Standard, or 10-year Standard — or one will be picked for you.\n\nThe mortgage angle most doctors miss: physician loan underwriters use your *documented* monthly student loan payment when calculating DTI. A SAVE payment of ~$420 auto-rolling into a $2,650 Standard payment can quietly shrink a $400K home approval into a \"let's revisit the loan amount\" conversation.\n\nIf you're closing on a home this year, three steps are worth taking now:\n\n1. Pull side-by-side payment estimates from studentaid.gov in June.\n2. Share them with your physician-mortgage loan officer *before* writing an offer.\n3. Decide whether to switch plans before or after your loan application — the sequence matters.\n\nThe product hasn't gotten worse. The paperwork just got more time-sensitive.\n\n#PhysicianFinance #StudentLoans #PhysicianMortgage #DoctorHomeBuying", "facebook": "Heads up to any doctors, dentists, or pharmacists shopping for a home this year:\n\nThe federal SAVE student loan plan is being wound down. Starting July 1, every SAVE borrower has 90 days to pick a new plan — and the one you land in directly affects how much house a physician-loan underwriter will approve you for.\n\nWe broke down what's changing, why it matters for your DTI, and the three steps to take before you write your next offer. Worth a 5-minute read if a closing is anywhere in your future.", "twitter": "The SAVE plan ends July 1. Physician borrowers get 90 days to pick a new plan.\n\nThe thing nobody's saying out loud: a SAVE payment of $420/mo rolling into a $2,650 Standard payment can quietly cut your physician-mortgage approval by six figures.\n\nMap the plan *before* you write the offer.", "instagram": "Same income. Same house. Same interest rate. Different student loan repayment plan = different approval amount.\n\nThat's the quiet reality of the SAVE plan wind-down for physicians shopping homes in 2026. Underwriters use your documented monthly payment when they calculate DTI — and the payment is about to change for ~7.5 million borrowers.\n\nThree things to do before July 1:\n→ Compare payment estimates across RAP, Tiered Standard, and 10-year Standard\n→ Share them with your physician-loan officer\n→ Decide whether to switch plans before or after your mortgage application\n\nLink in bio for the full breakdown.\n\n#PhysicianMortgage #DoctorLife #DentistLife #StudentLoans #HomeBuying #PhysicianFinance", "tiktok": "**Hook (first 2 seconds):** \"Doctors — the plan you pick in July could cost you a house.\"\n\n**Talking points (40–50 seconds total):**\n\n- The SAVE student loan plan is ending. Every borrower gets a 90-day notice starting July 1.\n- Physician mortgage underwriters use your *actual monthly student loan payment* to calculate DTI.\n- Going from a $420 SAVE payment to a $2,650 Standard payment can drop your approval by six figures on the exact same house.\n- Three quick moves: pull payment estimates from studentaid.gov, share them with your loan officer, and choose your timing intentionally.\n- Closing line: \"Don't let the default plan pick your house for you.\"\n\n**On-screen text overlay:** \"Same income. Same house. Different plan = different approval.\""}, {"date": "2026-05-16", "topic": "2026-05-16", "linkedin": "Most physician-mortgage articles obsess over the headline rate. They rarely cover the smaller decision sitting next to it: how — and how long — you lock that rate.\n\nIn a calm market, lock mechanics don't move the needle. In May 2026, they do.\n\nThree reasons the lock decision is doing real work right now:\n\n1. **Volatility is back.** Freddie Mac's 30-year survey has bounced between 6.23% and 6.51% in eight weeks. The smoothed weekly print understates how jumpy the daily indices have been.\n\n2. **Lock periods are repriced.** 30- and 45-day locks remain free at most physician-loan banks. 60-day locks now run ~0.125 points. 75- and 90-day locks run 0.25–0.375 points (~$1,250–$1,875 on a $500K loan).\n\n3. **Float-down only earns out under specific conditions.** It typically costs 0.25–0.50 points up front and triggers if rates drop 0.25% or more before closing. On a $500K loan with a 0.375-point cost, you need ~17 months of payments at the lower rate to break even — which is fine if you'll keep the loan that long, useless if you won't.\n\nA practical rule that holds for most physician borrowers:\n\n→ Pick the shortest lock period that comfortably covers your real timeline.\n→ Take float-down only when you're locking 45+ days out and the curve is sloping down.\n→ Get every lock term — period, fee, float-down trigger, extension policy — in writing on the Loan Estimate.\n\nAnd the wrinkle specific to this quarter: any file closing after July 1, 2026 will be underwritten against projected Repayment Assistance Plan (RAP) payments rather than current SAVE/PAYE. A lock protects your rate. It does not protect your DTI.\n\nFull article (no signup, educational only) → [link]\n\n#PhysicianFinance #PhysicianMortgage #HomeBuying #MedicalProfessionals", "facebook": "Quick one for the doctors, dentists, and pharmacists shopping for a home this spring.\n\nWhen you lock your mortgage rate, you're committing to a specific number for 30, 45, 60, or 90 days. Most physician-loan banks make the 30- and 45-day locks free. Anything longer costs a little — usually 0.125 to 0.375 points (that's $625 to $1,875 on a $500K loan).\n\nTwo things to keep in mind in May 2026:\n\n1. Rates have been bouncy. The \"official\" weekly average eased to 6.36% this week, but daily prints have swung 15–20 basis points inside the same week. Pick a lock period that gives you breathing room, but don't pay for 90 days if 45 will do.\n\n2. If your closing falls after July 1, your lender will start using your **projected** new student loan payment (under the new RAP plan) instead of your current one. That can shift your qualifying number meaningfully. A rate lock doesn't shield you from that — only checking with your loan officer ahead of time does.\n\nThree questions worth asking your lender, in writing:\n\n- What does each lock period cost at my loan amount?\n- What's your float-down policy (cost, trigger, window)?\n- What happens if my closing slips by a few days?\n\nGet those answers on paper before you sign anything. Full breakdown on the site (link in profile).", "twitter": "Physician mortgage rate-lock cheat sheet, May 2026:\n\n→ 30/45 days: free\n→ 60 days: ~0.125 pts\n→ 75–90 days: 0.25–0.375 pts\n→ Float-down: 0.25–0.50 pts, triggers if rates drop ≥0.25%\n\nPick the shortest lock that fits your real timeline. Get every term in writing.", "instagram": "A rate lock isn't a footnote. It's a small, separate decision that decides whether your \"good rate\" actually shows up at closing.\n\nThree things to know in May 2026:\n\n1. Daily mortgage prints are still jumpy. Pick the shortest lock that fits your real timeline — don't pay for 90 days if 45 will do.\n2. Float-down options cost 0.25–0.50 points up front. They only earn out if rates drop enough (usually 0.25%+) and you hold the loan long enough.\n3. If your close lands after July 1, your student-loan payment will be re-underwritten under the new RAP plan. A rate lock protects your rate, not your DTI.\n\nFull guide on the site — link in bio.\n\n#PhysicianMortgage #DoctorMortgage #DentistFinance #PharmacistLife #HomeBuying2026 #PhysicianFinance #MedicalProfessionals", "tiktok": "**Length:** 45–60 seconds. Direct-to-camera. Captions on.\n\n\"Your physician-loan rate doesn't actually exist until you lock it. Here's the part nobody tells you.\"\n\n**Talking points:**\n- Most physician-loan banks let you lock for 30 or 45 days **free.**\n- 60 days costs ~$625 on a $500K loan. 90 days costs $1,250–$1,875.\n- Float-down sounds great — but it costs 0.25–0.50 points up front and only triggers if rates drop 0.25% or more before closing.\n- Rule: pick the shortest lock that fits your real timeline. Don't pay for 90 days if 45 will do.\n- And if you're closing after July 1, your student loan payment is getting re-underwritten under the new RAP plan. A rate lock won't save you from that. Talk to your loan officer.\n\n**Closing card (0:55–1:00):** \"Lock period. Float-down trigger. Extension policy. Get all three in writing.\"\n\n**Caption:** Rate locks aren't a side detail in spring 2026. They're the part of the deal you can actually control. #physicianmortgage #doctorhomebuying #medicalprofessional #firsttimehomebuyer #mortgagetips"}, {"date": "2026-05-17", "topic": "2026-05-17", "linkedin": "Most physician mortgage shopping starts and ends with the rate.\n\nThat made sense in 2021, when the 30-year fixed was 2.9% and a quarter-point delta moved the monthly payment more than the entire closing-cost stack.\n\nIn spring 2026, with the 30-year fixed clustered at 6.36% and physician-loan dispersion of 25–50 bp across the active banks, the math has flipped. The closing-cost column is where the next several thousand dollars of real savings are now hiding.\n\nThree things changed quietly this cycle:\n\n1. National closing costs rose 3.8% YoY. On a $400K home, buyer-side closing costs now run $8,500–$15,200 — 2% to 5% of purchase price.\n\n2. Seller concessions normalized. About 35% of 2026 transactions include them, averaging ~$8,500 per deal. Two years ago this was rare.\n\n3. Inventory is up materially YoY in many metros, giving qualified physician buyers actual leverage to ask.\n\nFor a physician borrower, the rules that catch people off-guard:\n\n— Most physician-loan portfolio programs cap seller concessions at 3% of purchase price above 90% LTV and 6% at or below 75% LTV — but the exact cap is set by each lender's investor guidelines. Confirm in writing.\n\n— Concession dollars apply to closing costs, prepaids, escrows, and discount points. They can't come back as cash and can't pay down principal.\n\n— Concessions can't exceed your actual closing costs. If the cap allows $15K but your true close is $12K, the extra $3K doesn't transfer.\n\nIn a buyer-leaning market, the highest-leverage use of seller-credit dollars is almost always a rate buy-down (2-1 or permanent points), not a one-time credit toward the cash-to-close line. The monthly cash flow impact compounds for years.\n\nRead your Loan Estimate line by line. Shop the negotiable fees. Walk into the offer with a specific number — and a specific allocation — for seller credits.\n\n#PhysicianMortgage #PhysicianFinance #HomeBuying #MedicalProfessionals #DoctorLoan", "facebook": "A quick one for doctors, dentists, and pharmacists house-hunting this spring.\n\nEveryone obsesses over the mortgage rate. That makes sense in some markets. In spring 2026, with rates moving in a narrow band, the bigger savings are actually sitting in two places most buyers never look: the closing-cost line and the seller-concession negotiation.\n\nThree things to know before you write your next offer:\n\n✅ Closing costs on a $400K home now run $8,500–$15,200 — about 2%–5% of purchase price.\n✅ ~35% of 2026 buyers got seller concessions, averaging ~$8,500 per deal.\n✅ Most physician-loan programs let sellers contribute 3%–6% toward your closing costs and points (the exact cap depends on your lender and down payment).\n\nThe most valuable thing to ask for? A rate buy-down. A 2-1 buy-down funded by the seller can save you ~$400–$500/month in year one and ~$200–$250/month in year two on a $500K loan. That's real money — and it compounds.\n\nRead your Loan Estimate carefully. Shop your title insurance where you're allowed to. And don't leave seller credits on the table just because no one told you to ask.\n\n(Educational only — we're not a lender. Talk to yours about specifics.)", "twitter": "Spring 2026 physician-mortgage math:\n\n– 30-yr fixed: 6.36%\n– Closing costs on a $400K home: $8.5K–$15.2K\n– ~35% of buyers got seller concessions, avg $8.5K\n\nRate spread between lenders: 25–50 bp.\nSeller-credit dollars you can negotiate: thousands.\n\nYou're shopping the wrong thing.", "instagram": "The rate gets all the attention. The closing-cost line is doing more of the work.\n\nIn spring 2026, with mortgage rates clustered tightly and physician-loan dispersion only 25–50 bp across lenders, the closing-cost column is where physician borrowers can save the most without trading down on the loan.\n\nThree numbers that matter this spring:\n• Closing costs are up 3.8% YoY\n• 35% of 2026 buyers got seller concessions\n• Average concession: ~$8,500 per deal\n\nSave this for your next offer. 🩺🏠\n\n(Educational only — we're not a lender.)\n\n#PhysicianMortgage #PhysicianFinance #DoctorLoan #DentistFinance #PharmacistLife #FirstTimeHomeBuyer #HomeBuyingTips", "tiktok": "\"You're shopping the wrong number on your physician mortgage.\"\n\n**Talking points (45–60 seconds total):**\n\n- Most doctors compare rates. In 2026, lender-to-lender rate dispersion is only 25–50 bp. The rate isn't the savings line anymore.\n- Closing costs on a $400K home now run $8,500 to $15,200. That's 2–5% of the purchase price. Up 3.8% from last year.\n- 35% of buyers in 2026 are getting seller concessions. Average concession: $8,500.\n- Most physician loans let sellers contribute 3–6% of purchase price toward your closing costs.\n- The highest-leverage way to spend those concession dollars isn't a one-time cash credit. It's a 2-1 rate buy-down — saves you ~$400–$500/month year one on a $500K loan.\n- Three quick rules: concessions can't come back as cash, can't pay down principal, and can't exceed your actual closing costs.\n- Read your Loan Estimate. Confirm your lender's concession cap in writing. Walk into the offer with a number.\n\n**On-screen text overlays:**\n\"Rate spread: 25–50 bp\" / \"Closing costs: $8.5K–$15.2K\" / \"Seller credit average: $8,500\" / \"2-1 buy-down saves ~$500/mo year one\" / \"Educational only — not a lender.\"\n\n**Suggested sounds/style:** Direct-to-camera, whiteboard or sticky-note prop for the three rules. Hard cuts between stats. Caption: \"Save this before you write your next offer 🩺 #PhysicianMortgage #DoctorLoan #FirstTimeHomeBuyer #PharmacistLife #DentistLife\""}, {"date": "2026-05-18", "topic": "6", "linkedin": "The marketing on most physician-mortgage products leads with MDs and DOs. Pharmacists are listed as an afterthought — when they're listed at all. The reality in 2026 is more useful: many physician-mortgage banks do extend their programs to PharmDs, and the no-PMI, low-down-payment structure can be just as valuable to a pharmacist with $167,000 of school debt as it is to a third-year resident.\n\nBut the product behaves differently for pharmacists than it does for MDs, and treating them as identical is how files end up either at the wrong tier or denied after the credit pull. Three things to know going in:\n\n1. Pharmacist eligibility is bank-by-bank, not industry-wide. Confirm in the underwriting guideline, not on the marketing page.\n2. Most pharmacists qualify on W-2 income — not the future-contract pathway MDs use. If you're pre-paycheck, you need the smaller subset of banks that handle pharmacist contract closes.\n3. RAP launches July 1. On a $150K pharmacist AGI, projected RAP runs $750–$1,000/month — enough to move a DTI from comfortably approved to needs-a-co-borrower. Lenders are already pre-underwriting RAP for post-July-1 closings.\n\nFull playbook (including a four-step pre-application checklist) on the blog. Link in comments.\n\n#Pharmacist #PharmD #PhysicianMortgage #HomeBuying #StudentLoans", "facebook": "Pharmacists: physician-mortgage loans aren't just for MDs. A meaningful share of banks extend the no-PMI, low-down-payment program to PharmDs too — but the rules are a little different. Here's what to watch for in 2026: bank-by-bank eligibility (not industry-wide), W-2 qualification (most pharmacists don't get the same future-contract treatment MDs do), and the new RAP student loan plan that kicks in July 1 and can shift your debt-to-income ratio meaningfully. Full breakdown plus a 4-step playbook on the blog.", "twitter": "Pharmacists: physician-mortgage loans often include you — but the tiers are tighter than the MD version, the qualification leans on W-2 (not future contract), and the July 1 RAP cutover can shift your DTI by ~$1K/mo on a $150K salary. Confirm eligibility in the guideline, not the brochure. (271 chars)", "instagram": "Pharmacists, the physician-mortgage product can absolutely work for you in 2026 — but it's not the MD version with a different headshot. Tiers are narrower, qualification usually leans on W-2 income instead of a future-contract letter, and the new RAP student-loan rules launching July 1 can move your DTI by hundreds of dollars a month on a $150K salary. Confirm eligibility in the bank's underwriting guideline before you let anyone pull credit. Full playbook on the blog — link in bio.\n\n#PharmD #Pharmacist #PhysicianMortgage #FirstHomeBuyer #StudentLoans #MedPharmaConnect", "tiktok": "**Hook (first 3 seconds):** \"Pharmacists — you probably qualify for a physician mortgage. But the rules aren't the same.\"\n\n**Talking points:**\n- Yes, many physician-mortgage banks include PharmDs — but not all. Check the underwriting guideline, not the marketing page.\n- Your tier is narrower than the MD tier. 0% down usually caps around $500K–$750K instead of $1M.\n- You usually qualify on W-2 income, not a future contract. So timing matters.\n- RAP starts July 1. On a $150K salary, projected payment can run $750–$1,000/month. That moves your DTI.\n- Get a quote from at least three pharmacist-eligible banks before you let anyone pull your credit.\n\n**On-screen text suggestion:** \"PharmD ≠ MD on a physician mortgage. Same product. Different tier. Different rules.\""}, {"date": "2026-05-19", "topic": "2026-05-19", "linkedin": "Rates haven't moved much. Freddie Mac's 30-yr fixed averaged 6.36% the week of May 14 — physician-loan band still mid-6% to low-7%. So the conversation has shifted from \"is the rate going to drop\" to \"who is paying to lower it.\"\n\nA few clarifying points for medical professionals weighing buydowns on a physician mortgage:\n\nA 2-1 buydown costs 2%–3% of the loan amount and lowers your rate by 2% in year 1 and 1% in year 2 before reverting. A 3-2-1 stretches that to three years for 3%–4% of the loan. Permanent discount points cost roughly 1% of the loan per ~0.25% of permanent rate reduction — break-even usually 4–5 years.\n\nThree details that change the answer:\n\n1. Most physician-loan portfolio programs cap seller concessions at 3% of purchase price above 90% LTV — exactly where most attending borrowers sit. A 3-2-1 on a $700K loan can blow through that limit fast.\n\n2. Lenders qualify your DTI on the note rate, not the buydown rate. With the RAP cutover on July 1 already pulling projected student-loan payments into underwriting, a buydown that fixes your monthly payment may not save a DTI-tight file.\n\n3. Unused buydown escrow is typically refundable to the payoff if you sell or refinance early — so the math is less binary than it looks.\n\nThe right buydown structure is a match between your hold period, your concession ceiling, and your post-July student-loan picture. Not a product.\n\n— MedPharmaConnect | Educational resource, not a lender.", "facebook": "Rates haven't really moved this spring — the 30-year fixed averaged 6.36% the week of May 14, and physician-loan rates are still in the mid-6% to low-7% range. So if you're buying right now, the real question is who's paying to bring that rate down.\n\nThere are four real options: a 2-1 temporary buydown (cheaper, two-year subsidy), a 3-2-1 buydown (deeper, three-year), permanent discount points (forever), and lender credits (higher rate, lower closing costs). Each one fits a different situation, and they don't all work the same on a physician mortgage.\n\nWe just walked through the math — including the three spring 2026 traps that catch a lot of physicians: the 3% seller-concession cap above 90% LTV, the July 1 RAP cutover that's changing how lenders qualify your DTI, and the price-cut-vs-rate-cut question every buyer should run before signing anything.\n\nWorth a read before you negotiate.", "twitter": "30-yr fixed: 6.36%. Physician-loan band: mid-6 to low-7%.\n\nThe real question this spring isn't \"are rates dropping?\" — it's \"who's paying to lower mine?\"\n\n2-1 buydown vs. 3-2-1 vs. permanent points vs. lender credits — what actually pencils on a physician mortgage in 2026. (271 chars)", "instagram": "The 30-year fixed averaged 6.36% the week of May 14, and physician-loan rates are still mid-6% to low-7%. So this spring, the conversation between doctors and lenders isn't really about whether rates will fall — it's about who's paying to bring them down right now.\n\nFour real structures. Different math on each. And on a physician mortgage, the 3% seller-concession cap above 90% LTV plus the July 1 RAP cutover change the answer in ways most online calculators miss.\n\nFull breakdown — including the three traps to avoid — on the site.\n\n— MedPharmaConnect | Educational, not a lender.\n\n#PhysicianMortgage #DoctorHomeLoan #MortgageBuydown #MedicalProfessionals #DentistHomeLoan #PharmacistHomeLoan #FirstTimeHomeBuyer #RealEstateForDoctors", "tiktok": "**Hook (0–3s):** *Doctor looks at lender quote.* \"The seller offered me $15,000. Do I take a price cut or buy down my rate?\"\n\n**Talking points (3–55s):**\n- Quick fact: 30-yr fixed is 6.36% right now — that hasn't really moved\n- $15K price cut on a $500K home = ~$95/month for 30 years\n- Same $15K as a 3-2-1 buydown = ~$750/month savings in year 1 (but reverts)\n- Hold the house 30 years? Price cut wins\n- Refinance in 3 years when rates ease? Buydown wins big\n- Physician-loan watch-out: most programs cap seller concessions at 3% of purchase price above 90% LTV\n- July 1 RAP cutover changes the DTI math separately — neither buydown fixes that\n\n**Close (55–60s):** \"Run both numbers against your honest hold period. Full breakdown at MedPharmaConnect — link in bio. Educational, not a lender.\"\n\n**Caption:** Price cut vs. rate buydown — which $15K actually saves you more? Depends on one number. #physicianmortgage #doctorhomeloan #firsttimehomebuyer #medicalprofessional #mortgagetips"}, {"date": "2026-05-20", "topic": ".", "linkedin": "Physician mortgage coverage obsesses over student debt. It treats your credit score as the easy part.\n\nIt usually is — until it quietly isn't.\n\nA physician mortgage isn't pass/fail on credit. It's tiered, and each tier buys you something different:\n\n→ The program floor runs ~660–720 across lenders. Clearing it gets you in the door — not the best pricing.\n→ The generous structures key off your score: reported 2026 examples show 100% financing up to ~$1.5M at a 680, and up to ~$2M at 720.\n→ Rate ladder: roughly every 20 points above 740 improves your rate by about 0.125%. On a $700K loan, that compounds for decades.\n\nA 712 and a 762 both \"qualify.\" They are not buying the same mortgage.\n\nAnd the real danger isn't your starting score — it's the 30–60 days between pre-approval and closing, when lenders re-pull your credit. Five mistakes do most of the damage:\n\n1. Financing a car or furniture for the new house\n2. Opening a retail card for the checkout discount\n3. A single 30-day late payment (can cost 50–100 points)\n4. Closing old cards (shortens history, raises utilization)\n5. Co-signing a loan\n\nWith the 30-year fixed flat at 6.36%, the rate environment is out of your hands. Your credit file isn't. Freeze it from pre-approval to closing — no new accounts, no closed accounts, no missed payments.\n\nThe physician who manages their own credit file beats the one waiting for the market to move.\n\n#PhysicianMortgage #PhysiciansOfLinkedIn #DoctorFinance #CreditScore #HomeBuying #DentistLife #PharmacistLife", "facebook": "Buying a home this year? Here's a tip that saves doctors real money — and it has nothing to do with your student loans.\n\nYour credit score on a physician mortgage isn't a simple yes or no. It works in tiers. Clearing the minimum (usually around 700) gets you in the program. But pushing higher unlocks bigger loan amounts, smaller down payments, and a better rate — roughly 0.125% better for every 20 points above 740.\n\nAnd here's the part people miss: the most dangerous time for your credit is AFTER you're pre-approved. Lenders re-check your credit right before closing. So between pre-approval and the keys, don't:\n\n🚫 Finance a car or furniture for the new place\n🚫 Open a store card for the checkout discount\n🚫 Miss a payment (one late can cost 50–100 points)\n🚫 Close old credit cards\n🚫 Co-sign anyone's loan\n\nFreeze your credit profile and keep it boring until you've closed. Your future self will thank you. 🏡", "twitter": "On a physician mortgage, your credit score isn't pass/fail — it's tiered.\n\n~700 gets you in. 740+ gets you the rate. Every 20 pts above 740 ≈ 0.125% better.\n\nAnd after pre-approval? Freeze your credit. No new car, no store cards, no missed payments. Lenders re-pull before closing.", "instagram": "Your credit score on a physician mortgage isn't yes-or-no. It's a staircase. 📈\n\nEvery step up unlocks something — a bigger loan, a smaller down payment, a better rate. Roughly every 20 points above 740 trims about 0.125% off your rate.\n\nBut here's the move most doctors miss: once you're pre-approved, FREEZE your credit. 🔒 No new cards. No financed furniture. No closed accounts. No missed payments. Lenders re-pull right before closing — and a clean approval can turn conditional fast.\n\nClimb the steps. Then hold completely still.\n\nEducational only — not a lender. Confirm details with a licensed loan officer.\n\n#PhysicianMortgage #DoctorLoan #CreditScore #HomeBuying #MedicalProfessionals #DentistLife #PharmacistLife #FirstTimeHomeBuyer", "tiktok": "**Hook (on screen + spoken):** \"Two doctors. Same income. One pays 0.25% more on their mortgage. Here's the difference. 👇\"\n\n**Talking points (30–45 sec):**\n- On a physician mortgage, credit isn't pass/fail — it's tiered.\n- ~700 gets you in the program. But every 20 points above 740 trims about 0.125% off your rate.\n- A 712 and a 762 both \"qualify.\" They are NOT buying the same loan.\n- And after you're pre-approved? Lenders re-pull your credit before closing.\n- So DON'T: finance a car, open a store card, miss a payment, close old cards, or co-sign anything.\n- Freeze your credit and keep it boring until you've got the keys. 🔑\n\n**On-screen text overlay:** \"Pre-approved? Freeze your credit. 🔒\"\n\n**Caption:** The credit lever doctors ignore on a physician mortgage. #physicianmortgage #doctorloan #creditscore #homebuyingtips #medtok"}, {"date": "2026-05-21", "topic": ".", "linkedin": "Physician mortgage advice almost always stops at pre-approval. Sort your DTI, shop three to five lenders, lock a rate — done.\n\nBut there's a step between \"offer accepted\" and \"keys in hand\" that gets no airtime and can quietly unwind a clean file: the appraisal.\n\nHere's why it bites harder on a physician loan than on almost any other product.\n\nYour lender finances against the LOWER of the contract price or the appraised value. Agree to $700K, appraise at $675K, and the lender treats it as a $675K deal. That $25K is the \"appraisal gap.\"\n\nOn a conventional loan with 20% down, a gap is uncomfortable but absorbable — there's already a cash cushion in the deal.\n\nA physician mortgage is built on the opposite premise: 0%–10% down. The same low-down-payment benefit that preserves your cash also removes the shock absorber. When the number comes in low, the gap lands directly on you — as cash you have to find on two weeks' notice.\n\nThe good news for 2026: broad appraisal-gap risk is lower than the 2021–22 frenzy — fewer bidding wars, fewer over-list contracts. But the risk is now concentrated rather than universal:\n\n→ Appraisers turn more conservative in a balanced market, leaning on historical comps\n→ Years of low transaction volume mean fewer recent comparable sales to work from\n→ Risk is intensely local — custom or renovated homes in thin-sales pockets are most exposed\n\nIf the number comes in low, you usually have more room than the first panic suggests: keep your appraisal contingency, renegotiate with the seller, request a reconsideration of value, cover the gap in cash, or walk.\n\nThe physician loan's low down payment is a real advantage — right up until a low appraisal turns it into exposure. Plan for it instead of being surprised by it.\n\n#PhysicianMortgage #PhysiciansOfLinkedIn #DoctorFinance #HomeBuying #RealEstate #DentistLife #PharmacistLife", "facebook": "Buying a home this year? Here's a step that surprises a lot of doctors — and it happens AFTER you're pre-approved.\n\nIt's the appraisal. Your lender sends out an independent appraiser to confirm the home is worth what you agreed to pay. And they'll only lend against the lower of your contract price or the appraised value.\n\nSo if you agree to $700,000 and it appraises at $675,000, the bank treats it as a $675,000 home. That $25,000 difference? It's on you.\n\nHere's why this matters more on a physician mortgage: the whole point of the product is putting little or no money down. That's great for keeping cash free — but it means there's no cushion to absorb a low appraisal. The gap lands on you as cash, fast.\n\nThe good news: in 2026's calmer market, low appraisals are less common than they were a few years ago. And if it does happen, you have options 👇\n\n✅ Keep an appraisal contingency in your offer\n✅ Renegotiate — a low appraisal is real evidence the seller will often respect\n✅ Ask your lender for a reconsideration of value\n✅ Cover the gap in cash if the home is worth it to you\n✅ Walk away — with your contingency, you can\n\nBudget a little cash beyond your down payment, and ask your agent early about recent sales in the neighborhood. A little planning makes the appraisal a formality instead of a crisis. 🏡", "twitter": "Your lender finances the LOWER of contract price or appraised value.\n\nAgree to $700K, appraise at $675K → that $25K gap is on you.\n\nOn a 0%-down physician loan there's no cushion to absorb it. Keep your appraisal contingency. Budget cash beyond the down payment. Plan for it.", "instagram": "The physician mortgage step nobody warns you about: the appraisal. 🏡\n\nYour lender only finances the LOWER of the contract price or the appraised value. Agree to $700K, appraise at $675K — and that $25K gap is yours to cover.\n\nHere's the catch: a physician loan is built on 0%–10% down. The low down payment that keeps your cash free also removes the cushion that would absorb a low appraisal.\n\nGood news — in 2026's calmer market, low appraisals are less common than they were. And if it happens, you have options: keep your appraisal contingency, renegotiate, request a reconsideration of value, cover the gap, or walk.\n\nBudget a little cash beyond your down payment. Plan for it. 🔑\n\nEducational only — not a lender. Confirm details with a licensed loan officer and your agent.\n\n#PhysicianMortgage #DoctorLoan #HomeAppraisal #HomeBuying #MedicalProfessionals #DentistLife #PharmacistLife #FirstTimeHomeBuyer", "tiktok": "**Hook (on screen + spoken):** \"Your home appraised $25,000 below what you agreed to pay. On a physician loan, guess who covers that. 👀\"\n\n**Talking points (30–45 sec):**\n- Your lender finances the LOWER of the contract price or the appraised value.\n- Agree to $700K, appraise at $675K — the bank treats it as a $675K home.\n- That $25K gap? It's on you. In cash. Fast.\n- And a physician mortgage is 0%–10% down — there's no down-payment cushion to absorb it.\n- Good news: in 2026's calmer market, low appraisals are less common than they were.\n- If it happens: keep your appraisal contingency, renegotiate, ask for a reconsideration of value, cover the gap, or walk.\n- Budget a little cash beyond your down payment. Don't get caught flat. 🔑\n\n**On-screen text overlay:** \"Lower of contract price OR appraised value. Plan for the gap.\"\n\n**Caption:** The physician mortgage step that surprises everyone. #physicianmortgage #doctorloan #homeappraisal #homebuyingtips #medtok"}, {"date": "2026-05-22", "topic": "r", "linkedin": "New federal student loan rules (effective July 1, 2026) are reshaping the financial landscape for physicians, dentists, and pharmacists — and if you're planning to buy a home in the next few years, they're worth understanding.\n\nThe short version: Grad PLUS loans are being eliminated for new borrowers, annual federal borrowing limits are dropping to $50,000, and PSLF residency credit is going away for new borrowers. More doctors will carry a mix of federal and private loans with less flexible repayment terms.\n\nHere's the silver lining most people miss: physician mortgage loans account for this. Their DTI underwriting excludes or minimizes student debt in ways conventional loans don't. As the student loan picture grows more complex, that advantage compounds.\n\nIf you're a resident, fellow, or early attending navigating these changes, understanding how physician mortgages handle your debt profile could meaningfully change what you can afford — and when.\n\nFull breakdown on our site 👇\n[link to article]\n\n#PhysicianMortgage #MedicalProfessionals #StudentLoanChanges #PhysicianFinance #ResidentLife #HomeOwnership", "facebook": "Big changes to federal student loans are hitting in July 2026 — and if you're a doctor, dentist, or pharmacist epayment situations.\n\n3. Here's the part nobody tells you: conventional mortgage lenders count all of that against you. They see $400K in student loans and it tanks your DTI.\n\n4. Physician mortgage lenders? They treat it differently. Some exclude it entirely. That's why doctors can qualify for a home while still carrying six figures in loans.\n\n5. If you're a resident or new attending, ask any lender you talk to: \"How do you calculate DTI with student loans?\" The answer will tell you everything."}, {"date": "2026-05-23", "topic": "The Student Loan Shakeup of 2026: What It Means for Your Physician Mortgage", "linkedin": "Major federal student loan changes take effect **July 1, 2026** — and if you're a physician, dentist, or pharmacist thinking about buying a home, these changes affect more than your monthly payment.\n\nHere's what's shifting:\n\n📌 **Grad PLUS loans are gone** for new borrowers, replaced by a $200K lifetime cap on professional degree borrowing\n📌 **PSLF residency credit is eliminated** — years spent in training no longer count toward the 120-payment threshold\n📌 **The new Repayment Assistance Plan (RAP)** replaces all existing IDR plans for new borrowers, and mortgage lenders are still catching up on how to handle RAP payments in DTI calculations\n\nIf you're a resident or attending planning to buy in the next year, the window to get pre-approved under the current underwriting environment is narrowing. The most important question to ask a physician mortgage lender right now: *How do you treat RAP payments in your DTI calculation?*\n\nThe rules have changed. Your strategy should too.\n\n🔗 Read the full breakdown at MedPharmaConnect → [link in bio]\n\n#PhysicianMortgage #MedicalProfessionals #StudentLoans #PSLF #PhysicianFinance #DoctorHomebuying #ResidentFinance\n\n---", "facebook": "Hey doctors, dentists, and pharmacists — big changes are coming to federal student loans on **July 1, 2026**, and they directly affect your ability to qualify for a d the right financial picture still matter most. But for those who've been sitting on the sidelines since 2023 waiting for conditions to improve: this is a meaningfully different environment.\n\n---", "facebook": "Hey everyone — if you're a doctor, dentist, or pharmacist who's been putting off buying a home while waiting for rates to drop, this post is for you.\n\nThe 2026 housing market is looking noticeably better than the last couple of years:\n- Rates are down from their peak (still not 2020 levels, but real improvement)\n- More homes are for sale — inventory is the highest it's been since 2019\n- Home price growth has slowed to 0–3% nationally, while physician incomes have kept growing\n\nFor medical professionals, there's also an added reason to think about timing: a major federal student loan policy change takes effect on July 1, 2026. It could affect how your student loan payments factor into your mortgage qualification — and not always in your favor.\n\nWe wrote about all of this in today's article. If you're thinking about buying in the next 6–12 months, it might be worth a read — and worth getting a pre-approval from a physician-loan-friendly lender before summer.\n\n(As always, this is educational content, not financial advice — talk to a licensed professional before making any decisions!)\n\n---", "twitter": "Physicians who waited out the 2023–2025 rate peak: the 2026 housing market actually looks different now.\n\nRates ~45bp below last spring. Inventory at 2019 highs. Home price growth slowing to 0–3%.\n\nOne catch: a federal student loan change on July 1 could shift your DTI. Worth knowing before you shop.\n\n\n\n---", "instagram": "Three years of waiting may be paying off. 🏡\n\nIf you're a physician, dentist, or pharmacist who's been holding off on buying a home — the 2026 market is showing real signs of improvement.\n\n✅ Rates meaningfully lower than 2023–2024 peaks\n✅ More inventory than we've seen since 2019\n✅ Home prices projected to rise just     for (const platform of platforms) {
      const text = post[platform];
      if (!text) continue;
      const limit = CHAR_LIMITS[platform];
      const overLimit = limit && text.length > limit;
      const dateObj = new Date(post.date + 'T12:00:00');
      const dateStr = dateObj.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
      
      html += `<div class="post-card">
        <div class="post-header">
          <div>
            <div class="post-date">${dateStr}</div>
            <div class="post-topic">${post.topic.substring(0,80)}${post.topic.length > 80 ? '…' : ''}</div>
          </div>
          <span class="platform-badge ${BADGES[platform]}">${LABELS[platform]}</span>
        </div>
        <div class="post-body">
          <div class="post-text" id="text-${post.date}-${platform}">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
          <div class="char-count ${overLimit ? 'char-warn' : ''}">${text.length} chars${limit ? ' / '+limit+' limit' : ''}${overLimit ? ' — trim before posting' : ''}</div>
          <button class="copy-btn" onclick="copyText(document.getElementById('text-${post.date}-${platform}').innerText, this)">Copy to Clipboard</button>
        </div>
      </div>`;
    }
  }
  
  container.innerHTML = html || '<div class="empty">No posts for this platform.</div>';
}

document.getElementById('totalPosts').textContent = POSTS.length * 5;
render();
</script>
</body>
</html>
